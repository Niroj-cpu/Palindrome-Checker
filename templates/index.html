<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Palindrome Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Palindrome Checker Chatbot 🤖</h1>
    
    <div class="chatbox" id="chatbox">
        <div class="bot-message">Hello! Type a word and I’ll tell you if it’s a palindrome.</div>
    </div>

    <input type="text" id="user-input" placeholder="Type a word..." />
    <button onclick="checkPalindrome()">Send</button>
</div>

<script src="script.js"></script>
</body>
</html>
